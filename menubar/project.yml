name: FleetMenuBar
options:
  bundleIdPrefix: com.neonwatty
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_APP_SANDBOX: NO
    COMBINE_HIDPI_IMAGES: YES

targets:
  FleetMenuBar:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: FleetMenuBar
        CFBundleDisplayName: Fleet Menu Bar
        CFBundleIdentifier: com.neonwatty.FleetMenuBar
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSHumanReadableCopyright: "Copyright © 2026 Jeremy Watt"

  FleetMenuBarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/FleetMenuBarTests
    dependencies:
      - target: FleetMenuBar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.neonwatty.FleetMenuBarTests
