name: Release Install Verify

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag or version to verify, for example v0.4.1"
        required: false
        default: latest
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  schedule:
    - cron: "20 15 * * 1"

permissions:
  contents: read

concurrency:
  group: release-install-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-release-install:
    runs-on: macos-latest
    timeout-minutes: 10
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ github.event.inputs.version || 'latest' }}
    steps:
      - uses: actions/checkout@v6
      - name: Verify published release install
        run: scripts/verify-release-install.sh
