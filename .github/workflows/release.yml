name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Test
        run: |
          go test -race -count=1 ./...
          make menubar-test
      - name: Package artifacts
        run: make release-local VERSION="${GITHUB_REF_NAME#v}"
      - name: Sign and notarize menu bar app
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          ZIP_PATH: dist/FleetMenuBar_${{ github.ref_name }}_darwin_arm64_signed.zip
        run: |
          if [ -z "${APPLE_DEVELOPER_ID}" ] || [ -z "${APPLE_ID}" ] || [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_APP_PASSWORD}" ]; then
            echo "Apple signing secrets are not configured; keeping unsigned menu bar artifact."
            exit 0
          fi
          scripts/sign-notarize-menubar.sh
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          generate_release_notes: true
