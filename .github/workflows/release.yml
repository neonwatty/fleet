name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Test
        run: |
          go test -race -count=1 ./...
          make menubar-test
      - name: Package artifacts
        run: make release-local VERSION="${GITHUB_REF_NAME#v}"
      - name: Sign and notarize menu bar app
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          ZIP_PATH: dist/FleetMenuBar_${{ github.ref_name }}_darwin_arm64_signed.zip
        run: |
          if [ -z "${APPLE_DEVELOPER_ID}" ] || [ -z "${APPLE_ID}" ] || [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_APP_PASSWORD}" ]; then
            echo "Apple signing secrets are not configured; keeping unsigned menu bar artifact."
            exit 0
          fi
          scripts/sign-notarize-menubar.sh
      - name: Write release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > "$RUNNER_TEMP/release-notes.md" <<EOF
          ## Install

          Download the CLI archive and, if you want the menu bar app, the menu bar zip into the same directory:

          - \`fleet_${VERSION}_darwin_arm64.tar.gz\`
          - \`FleetMenuBar_${VERSION}_darwin_arm64.zip\`

          Verify downloads with the matching \`.sha256\` files:

          \`\`\`sh
          shasum -c *.sha256
          \`\`\`

          Install:

          \`\`\`sh
          tar -xzf fleet_${VERSION}_darwin_arm64.tar.gz
          cd fleet_${VERSION}_darwin_arm64
          scripts/install.sh
          \`\`\`

          The installer copies \`fleet\` to \`/opt/homebrew/bin\`, initializes \`~/.fleet\` when needed, and installs \`FleetMenuBar.app\` when the zip is next to the extracted CLI directory. Set \`INSTALL_MENUBAR=0\` for CLI-only installs.

          EOF
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          body_path: ${{ runner.temp }}/release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
