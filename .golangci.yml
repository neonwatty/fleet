version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - unused
    - unparam
    - ineffassign
    - misspell
    - govet
    - staticcheck
    - errcheck
    - gocyclo
    - funlen
    - lll
    - goconst
    - dupl
    - prealloc
  settings:
    funlen:
      lines: 120
      statements: 60
    lll:
      line-length: 160
    gocyclo:
      min-complexity: 15
    dupl:
      threshold: 100
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - funlen
      - path: cmd/fleet/main\.go
        linters:
          - funlen
          - gocyclo
      # Bubble Tea Update()/View() are always big switch/render functions
      - path: internal/tui/app\.go
        linters:
          - gocyclo
          - funlen

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
